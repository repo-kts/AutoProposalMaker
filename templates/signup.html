<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sign up · {{ company_name }}</title>
  <link rel="stylesheet" href="/static/style.css?v=6">
</head>
<body>
  <header class="topbar">
    <a class="brand" href="https://kalopetech.com" target="_blank" rel="noopener">{{ company_name }}</a>
    <a class="brand-sub" href="mailto:{{ company_email }}">{{ company_email }}</a>
  </header>

  <main class="container auth-container">
    <section class="form-card auth-card">
      <h1>Create account</h1>
      <p class="muted">Sign up to start generating proposals.</p>

      {% if error %}
      <div class="auth-error">{{ error }}</div>
      {% endif %}

      <form method="post" action="/signup">
        <label>Email
          <input type="email" name="email" required autofocus value="{{ email or '' }}">
        </label>
        <label>Password <span class="optional">(at least 8 characters)</span>
          <input type="password" name="password" required minlength="8">
        </label>
        <label>Confirm password
          <input type="password" name="confirm" required minlength="8">
        </label>
        <button type="submit">Sign up</button>
      </form>

      <p class="auth-foot muted">
        Already have an account? <a href="/login" class="auth-link">Sign in</a>
      </p>
    </section>
  </main>
</body>
</html>
